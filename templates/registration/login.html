{% extends 'base.html' %}

{% block titulo %}Iniciar Sesión - GameStore{% endblock %}

{% block contenido %}
<div class="bg-white rounded-lg shadow-md p-6 max-w-md mx-auto border border-gray-200">
    <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">Iniciar Sesión</h1>
    
    <form method="POST">
        {% csrf_token %}
        <div class="space-y-4">
            {% for field in form %}
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type|default:'text' }}" name="{{ field.html_name }}" class="w-full border p-2 rounded shadow-sm focus:ring-blue-500 focus:border-blue-500 focus:outline-none">
                    {% if field.errors %}
                        <p class="text-red-500 text-xs mt-1">{{ field.errors.as_text }}</p>
                    {% endif %}
                </div>
            {% endfor %}
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded mt-6 transition shadow-sm">
            Ingresar
        </button>
    </form>
    
    <p class="text-sm text-gray-600 text-center mt-4">
        ¿No tienes cuenta? <a href="{% url 'register' %}" class="text-blue-600 hover:underline font-semibold">Regístrate acá</a>
    </p>
</div>
{% endblock %}
