{% extends 'base.html' %}

{% block titulo %}Eliminar Videojuego — GameStore{% endblock %}

{% block contenido %}
<div class="bg-white rounded-lg shadow-md p-6 max-w-md mx-auto border border-gray-200">
    <h1 class="text-2xl font-bold mb-4 text-gray-800">Eliminar videojuego</h1>
    <p class="text-gray-600 mb-6">
        ¿Estás seguro de que querés eliminar <strong>{{ videojuego.titulo }}</strong> del catálogo?
        Esta acción no se puede deshacer.
    </p>

    <form method="POST">
        {% csrf_token %}
        <div class="flex gap-3">
            <button type="submit" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 rounded transition shadow-sm">
                Sí, eliminar
            </button>
            <a href="{% url 'videojuego_detalle' videojuego.pk %}" class="flex-1 text-center bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2.5 rounded transition">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
