{% extends 'base.html' %}

{% block titulo %}Eliminar Reseña — GameStore{% endblock %}

{% block contenido %}
<div class="bg-gamestore-dark rounded-lg shadow-md p-6 max-w-md mx-auto border border-gray-200">
    <h1 class="text-3xl font-bold mb-4 text-white uppercase text-center">Eliminar reseña</h1>
    <p class="text-gray-100 mb-2">
        ¿Estás seguro de que querés eliminar tu reseña de
        <strong>{{ resena.videojuego.titulo }}</strong>?
    </p>
    <blockquote class="border-l-4 border-gray-300 pl-4 text-sm text-gamestore-muted italic mb-6">
        "{{ resena.comentario|truncatechars:120 }}"
    </blockquote>

    <form method="POST">
        {% csrf_token %}
        <div class="flex gap-3">
            <button type="submit" class="flex-1 bg-red-600 hover:bg-red-800 text-white font-bold py-2.5 rounded-lg transition shadow-md
            border border-red-600">
                Sí, eliminar
            </button>
            <a href="{% url 'videojuego_detalle' resena.videojuego.pk %}" class="flex-1 text-center bg-zinc-600 hover:bg-zinc-800 
            text-white font-semibold py-2.5 rounded-lg transition-colors border border-zinc-700 shadow-md">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
