{% extends 'base.html' %}

{% block titulo %}Cargar Saldo - GameStore{% endblock %}

{% block contenido %}
<div class="bg-white rounded-lg shadow-md p-6 max-w-md mx-auto border border-gray-200">
    <h1 class="text-2xl font-bold mb-2 text-gray-800">Cargar Saldo</h1>
    <p class="text-sm text-gray-600 mb-6">Tu saldo actual es: <strong class="text-green-600 text-lg">${{ user.saldo }}</strong></p>
    
    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label for="monto" class="block text-sm font-semibold text-gray-700 mb-1">Monto a acreditar ($):</label>
            <input type="number" step="0.01" min="1" name="monto" id="monto" placeholder="Ej: 500" class="w-full border p-2.5 rounded shadow-sm focus:ring-blue-500 focus:border-blue-500 focus:outline-none" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded transition shadow-sm">
            Confirmar Acreditación
        </button>
    </form>
</div>
{% endblock %}
